<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上課程來賓入口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1e; --ink-soft: #48484a; --ink-muted: #8e8e93;
    --paper: #faf9f7; --paper-warm: #f2efe9; --paper-dark: #e8e4dc;
    --accent: #3d5a3e; --accent-light: #e8f0e8; --accent-mid: #6b9e6c;
    --line: rgba(0,0,0,0.1); --radius: 4px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  /* ── Event picker screen ── */
  .picker-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: var(--paper-warm);
  }

  .picker-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .picker-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .brand-mark {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }

  .brand-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; font-weight: 700; color: var(--ink);
  }

  .picker-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; font-weight: 700; color: var(--ink);
    margin-bottom: 6px;
  }

  .picker-sub { font-size: 14px; color: var(--ink-muted); }

  .event-list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .event-pick-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .event-pick-card:hover {
    border-color: var(--accent-mid);
    box-shadow: 0 4px 16px rgba(61,90,62,0.1);
    transform: translateY(-1px);
  }

  .event-pick-dm {
    width: 52px;
    aspect-ratio: 2/3;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--paper-warm);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .event-pick-dm img { width: 100%; height: 100%; object-fit: cover; }

  .event-pick-info { flex: 1; min-width: 0; }

  .event-pick-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 700; color: var(--ink);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .event-pick-meta { font-size: 13px; color: var(--ink-muted); }

  .event-pick-arrow {
    color: var(--ink-muted);
    flex-shrink: 0;
    transition: transform 0.15s, color 0.15s;
  }

  .event-pick-card:hover .event-pick-arrow {
    transform: translateX(3px);
    color: var(--accent);
  }

  .no-event-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--ink-muted);
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── Main layout (form screen) ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
  }

  /* Left DM panel */
  .dm-panel {
    position: relative;
    background: var(--paper-warm);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    overflow: hidden;
    min-height: 100vh;
  }

  .dm-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px);
  }

  .dm-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .dm-frame {
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.06);
    display: flex; align-items: center; justify-content: center;
  }

  .dm-frame img { width: 100%; height: 100%; object-fit: cover; }

  .dm-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; color: var(--ink-muted);
    font-size: 13px; height: 100%;
  }

  .dm-empty svg { opacity: 0.3; }

  .event-title-display {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; font-weight: 700; color: var(--ink);
    text-align: center; line-height: 1.5;
  }

  .event-datetime-display {
    font-size: 13px;
    color: var(--ink-muted);
    text-align: center;
  }

  .event-desc-display {
    text-align: center; line-height: 1.8;
    font-size: 13px; color: var(--ink-soft);
  }

  /* Right form panel */
  .form-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px;
    background: var(--paper);
  }

  .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
  }

  .back-to-list {
    font-size: 13px; color: var(--ink-muted); cursor: pointer;
    text-decoration: underline; text-underline-offset: 3px;
    margin-left: auto;
  }

  .back-to-list:hover { color: var(--ink); }

  .form-heading {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px; font-weight: 700; color: var(--ink);
    margin-bottom: 4px; line-height: 1.3;
  }

  .form-sub { font-size: 14px; color: var(--ink-muted); margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 8px; text-transform: uppercase; }
  .field input { width: 100%; padding: 12px 16px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; color: var(--ink); transition: border-color 0.15s, box-shadow 0.15s; outline: none; }
  .field input:focus { border-color: var(--accent-mid); box-shadow: 0 0 0 3px rgba(107,158,108,0.15); }

  .identity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .id-chip { padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: all 0.15s; text-align: center; }
  .id-chip:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
  .id-chip.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 500; }

  .submit-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s, transform 0.1s; letter-spacing: 0.03em; }
  .submit-btn:hover { background: #2e4530; }
  .submit-btn:active { transform: scale(0.99); }

  .error-msg { background: #fdf2f2; border: 1px solid rgba(180,60,60,0.2); color: #c0392b; border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

  /* Success */
  .success-screen { text-align: center; padding: 20px 0; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .success-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; border: 2px solid var(--accent-mid); }
  .success-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--ink-muted); margin-bottom: 24px; line-height: 1.7; }
  .zoom-card { background: var(--paper-warm); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px 20px; text-align: left; }
  .zoom-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 6px; }
  .zoom-event-title { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--ink); }
  .zoom-link-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: var(--accent); color: #fff; border-radius: var(--radius); text-decoration: none; font-size: 14px; font-weight: 500; transition: background 0.15s; }
  .zoom-link-btn:hover { background: #2e4530; }
  .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: var(--ink-muted); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  .back-link:hover { color: var(--ink); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .dm-panel { min-height: auto; padding: 28px 24px; border-right: none; border-bottom: 1px solid var(--line); }
    .dm-inner { max-width: 200px; }
    .form-panel { padding: 28px 24px; }
    .form-heading { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- ── Event picker ── -->
<div id="pickerScreen" class="picker-screen">
  <div class="picker-header">
    <div class="picker-brand">
      <div class="brand-mark">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="brand-name">週二線上課程</span>
    </div>
    <h1 class="picker-title">請選擇您要參加的活動</h1>
    <p class="picker-sub">點擊活動後填寫資料即可取得 Zoom 連結</p>
  </div>
  <div class="event-list" id="eventList"></div>
</div>

<!-- ── Form screen ── -->
<div id="formScreen" class="layout" style="display:none;">
  <div class="dm-panel">
    <div class="dm-inner">
      <div class="dm-frame" id="dmFrame">
        <div class="dm-empty">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>活動 DM 尚未上傳</span>
        </div>
      </div>
      <div id="eventTitleDisplay" class="event-title-display"></div>
      <div id="eventDatetimeDisplay" class="event-datetime-display"></div>
      <div id="eventDescDisplay" class="event-desc-display"></div>
    </div>
  </div>

  <div class="form-panel">
    <div class="brand">
      <div class="brand-mark">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="brand-name" style="font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;">週二線上課程</span>
      <span class="back-to-list" onclick="goBackToPicker()">← 返回選擇活動</span>
    </div>

    <div id="formSection">
      <h1 class="form-heading">來賓登入</h1>
      <p class="form-sub" id="formSubText">請填寫基本資料以取得本次課程連結</p>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <div class="field">
        <label>您的身分</label>
        <div class="identity-grid">
          <div class="id-chip" data-id="health" onclick="selectId(this)">健管師</div>
          <div class="id-chip" data-id="guest" onclick="selectId(this)">受邀來賓</div>
          <div class="id-chip" data-id="staff" onclick="selectId(this)">行政 / 工作人員</div>
          <div class="id-chip" data-id="npo" onclick="selectId(this)">社區據點 / NPO 協會</div>
        </div>
      </div>

      <div class="field">
        <label>姓名</label>
        <input type="text" id="nameInput" placeholder="請輸入您的姓名">
      </div>

      <div class="field" id="inviterField" style="display:none;">
        <label>邀請人 <span style="color:var(--accent);font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;">必填</span></label>
        <input type="text" id="inviterInput" placeholder="請輸入邀請您的人員姓名">
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">確認登入 →</button>
    </div>

    <div id="successSection" style="display:none;">
      <div class="success-screen">
        <div class="success-icon">
          <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#3d5a3e" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="success-title">歡迎參與！</h2>
        <p class="success-sub" id="successSub"></p>
        <div class="zoom-card">
          <div class="zoom-label">本次課程連結</div>
          <div class="zoom-event-title" id="successEventTitle" style="white-space:pre-line;"></div>
          <a class="zoom-link-btn" id="zoomLinkBtn" href="#" target="_blank" rel="noopener">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="15" height="10" rx="2"/><path d="M17 9l5-3v12l-5-3"/>
            </svg>
            進入 Zoom 課程
          </a>
        </div>
        <span class="back-link" onclick="resetAndPickAgain()">← 返回活動列表</span>
      </div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxWwieJD31_Or6FNdH6LHNY07hWepbKBpjvBb4Co3wYtX0QqpieDJoTxKKICMUIHb660w/exec';

let currentEvent = null;
let selectedId   = '';
let cachedEvents = [];

// ── 日期時間格式化（給來賓看的易讀格式）──
function formatDisplay(date, time) {
  let dateStr = '';
  let timeStr = '';

  if (date) {
    // date 格式：yyyy-MM-dd
    const clean = String(date).trim();
    const parts = clean.split('-');
    if (parts.length === 3) {
      const y = parts[0];
      const m = parseInt(parts[1], 10);
      const d = parseInt(parts[2], 10);
      if (!isNaN(m) && !isNaN(d)) {
        dateStr = `${y} 年 ${m} 月 ${d} 日`;
      } else {
        dateStr = clean;
      }
    } else {
      dateStr = clean;
    }
  }

  if (time) {
    // time 格式：HH:mm（純文字，不是 Date 物件）
    const clean = String(time).trim();
    // 取前5字確保格式乾淨（避免多餘字元）
    const t = clean.length > 5 ? clean.substring(0, 5) : clean;
    const colonIdx = t.indexOf(':');
    if (colonIdx > 0) {
      const hour = parseInt(t.substring(0, colonIdx), 10);
      const min  = t.substring(colonIdx + 1);
      if (!isNaN(hour)) {
        const ampm   = hour < 12 ? '上午' : '下午';
        const hour12 = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
        timeStr = `${ampm} ${hour12}:${min}`;
      } else {
        timeStr = clean;
      }
    } else {
      timeStr = clean;
    }
  }

  return [dateStr, timeStr].filter(Boolean).join('　');
}

// ── Load & render picker ──
async function loadPicker() {
  const list = document.getElementById('eventList');
  list.innerHTML = '<div class="no-event-msg">載入中…</div>';

  try {
    const res  = await fetch(GAS_URL + '?action=getEvents');
    const data = await res.json();

    if (!data.success || data.events.length === 0) {
      list.innerHTML = '<div class="no-event-msg">目前沒有進行中的活動，<br>請稍後再查看。</div>';
      return;
    }

    cachedEvents = data.events;
    list.innerHTML = cachedEvents.map(ev => {
      const dmHtml = ev.dmUrl
        ? `<img src="${ev.dmUrl}" alt="DM">`
        : `<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
      const datetimeStr = formatDisplay(ev.date, ev.time);
      return `<div class="event-pick-card" onclick="selectEvent('${ev.id}')">
        <div class="event-pick-dm">${dmHtml}</div>
        <div class="event-pick-info">
          <div class="event-pick-title">${escHtml(ev.title||'未命名活動')}</div>
          <div class="event-pick-meta">${datetimeStr}</div>
        </div>
        <svg class="event-pick-arrow" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    }).join('');

  } catch(err) {
    list.innerHTML = '<div class="no-event-msg">載入失敗，請重新整理頁面。</div>';
  }
}

function selectEvent(id) {
  currentEvent = cachedEvents.find(e => String(e.id) === String(id));
  if (!currentEvent) return;

  // Render left panel
  const datetimeStr = formatDisplay(currentEvent.date, currentEvent.time);
  document.getElementById('eventTitleDisplay').textContent    = currentEvent.title || '';
  document.getElementById('eventDatetimeDisplay').textContent = datetimeStr;
  document.getElementById('eventDescDisplay').textContent     = currentEvent.description || '';
  document.getElementById('dmFrame').innerHTML = currentEvent.dmUrl
    ? `<img src="${currentEvent.dmUrl}" alt="活動DM" style="width:100%;height:100%;object-fit:cover;">`
    : `<div class="dm-empty"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>活動 DM 尚未上傳</span></div>`;

  document.getElementById('pickerScreen').style.display = 'none';
  document.getElementById('formScreen').style.display   = 'grid';
}

function goBackToPicker() {
  resetForm();
  document.getElementById('formScreen').style.display   = 'none';
  document.getElementById('pickerScreen').style.display = 'flex';
  currentEvent = null;
}

// ── Form ──
function selectId(el) {
  document.querySelectorAll('.id-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedId = el.dataset.id;
  // 只有受邀來賓才顯示邀請人欄位
  document.getElementById('inviterField').style.display = (selectedId === 'guest') ? 'block' : 'none';
  if (selectedId !== 'guest') document.getElementById('inviterInput').value = '';
}

async function handleSubmit() {
  const name    = document.getElementById('nameInput').value.trim();
  const inviter = document.getElementById('inviterInput').value.trim();
  const errEl   = document.getElementById('errorMsg');

  if (!selectedId) { showError('請選擇您的身分'); return; }
  if (!name)        { showError('請填寫您的姓名'); return; }
  if (selectedId === 'guest' && !inviter) { showError('受邀來賓請填寫邀請人'); return; }
  errEl.style.display = 'none';

  const btn = document.getElementById('submitBtn');
  btn.textContent = '送出中…';
  btn.disabled = true;

  const idMap    = {health:'健管師', guest:'受邀來賓', staff:'行政/工作人員', npo:'社區據點/NPO協會'};
  const loginTime = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  const inviterVal = selectedId === 'guest' ? inviter : '';

  // 送 Google Sheets
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      eventTitle: currentEvent.title || '',
      eventDate:  currentEvent.date  || '',
      eventTime:  currentEvent.time  || '',
      name,
      identity:   idMap[selectedId] || selectedId,
      inviter:    inviterVal,
      loginTime
    })
  }).catch(() => {}); // 失敗靜默，不影響來賓體驗

  btn.textContent = '確認登入 →';
  btn.disabled = false;

  const datetimeStr = formatDisplay(currentEvent.date, currentEvent.time);
  document.getElementById('successSub').textContent        = `歡迎 ${name}（${idMap[selectedId]}），請點擊下方連結進入課程`;
  document.getElementById('successEventTitle').textContent = `${currentEvent.title || ''}${datetimeStr ? '\n' + datetimeStr : ''}`;
  document.getElementById('zoomLinkBtn').href              = currentEvent.zoomLink || '#';

  document.getElementById('formSection').style.display    = 'none';
  document.getElementById('successSection').style.display = 'block';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function resetForm() {
  selectedId = '';
  document.getElementById('nameInput').value    = '';
  document.getElementById('inviterInput').value = '';
  document.getElementById('inviterField').style.display = 'none';
  document.querySelectorAll('.id-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successSection').style.display = 'none';
  document.getElementById('formSection').style.display    = 'block';
}

function resetAndPickAgain() {
  resetForm();
  goBackToPicker();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadPicker();
</script>
