<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上課程來賓入口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1e;
    --ink-soft: #48484a;
    --ink-muted: #8e8e93;
    --paper: #faf9f7;
    --paper-warm: #f2efe9;
    --paper-dark: #e8e4dc;
    --accent: #3d5a3e;
    --accent-light: #e8f0e8;
    --accent-mid: #6b9e6c;
    --line: rgba(0,0,0,0.1);
    --radius: 4px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
  }

  /* ── Left: DM Panel ── */
  .dm-panel {
    position: relative;
    background: var(--paper-warm);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    overflow: hidden;
    min-height: 100vh;
  }

  .dm-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(0,0,0,0.04) 39px,
      rgba(0,0,0,0.04) 40px
    );
  }

  .dm-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .dm-frame {
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dm-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .dm-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--ink-muted);
    font-size: 13px;
    height: 100%;
  }

  .dm-empty svg { opacity: 0.3; }

  .event-desc {
    text-align: center;
    line-height: 1.8;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .event-title-display {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.5;
  }

  /* ── Right: Form Panel ── */
  .form-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px;
    background: var(--paper);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
  }

  .brand-mark {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-mark svg { color: #fff; }

  .brand-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .form-heading {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .form-sub {
    font-size: 14px;
    color: var(--ink-muted);
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  .field input:focus {
    border-color: var(--accent-mid);
    box-shadow: 0 0 0 3px rgba(107,158,108,0.15);
  }

  /* Identity chips */
  .identity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .id-chip {
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    white-space: nowrap;
  }

  .id-chip:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }
  .id-chip.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 500; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
  }

  .submit-btn:hover { background: #2e4530; }
  .submit-btn:active { transform: scale(0.99); }

  .error-msg {
    background: #fdf2f2;
    border: 1px solid rgba(180,60,60,0.2);
    color: #c0392b;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
  }

  /* ── Success screen ── */
  .success-screen {
    text-align: center;
    padding: 24px 0;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .success-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    border: 2px solid var(--accent-mid);
  }

  .success-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .success-sub {
    font-size: 14px;
    color: var(--ink-muted);
    margin-bottom: 28px;
    line-height: 1.7;
  }

  .zoom-card {
    background: var(--paper-warm);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 20px;
    text-align: left;
  }

  .zoom-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }

  .zoom-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .zoom-link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }

  .zoom-link-btn:hover { background: #2e4530; }

  .back-link {
    display: inline-block;
    margin-top: 20px;
    font-size: 13px;
    color: var(--ink-muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .back-link:hover { color: var(--ink); }

  /* No event state */
  .no-event {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    height: 100%;
    gap: 12px;
    color: var(--ink-muted);
    padding: 40px;
  }

  .no-event p { font-size: 15px; line-height: 1.7; }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .dm-panel {
      min-height: auto;
      padding: 32px 24px;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    .dm-inner { max-width: 240px; }
    .dm-frame { aspect-ratio: 2/3; max-height: 300px; }
    .form-panel { padding: 32px 24px; }
    .form-heading { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="layout" id="app">
  <!-- Left DM Panel -->
  <div class="dm-panel">
    <div class="dm-inner">
      <div class="dm-frame" id="dmFrame">
        <div class="dm-empty">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>活動 DM 尚未上傳</span>
        </div>
      </div>
      <div id="eventTitleDisplay" class="event-title-display"></div>
      <div id="eventDescDisplay" class="event-desc"></div>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="form-panel">
    <div class="brand">
      <div class="brand-mark">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <span class="brand-name">週二線上課程</span>
    </div>

    <div id="formSection">
      <h1 class="form-heading">來賓登入</h1>
      <p class="form-sub">請填寫基本資料以取得本次課程連結</p>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <div class="field">
        <label>您的身分</label>
        <div class="identity-grid" id="identityGrid">
          <div class="id-chip" data-id="health" onclick="selectId(this)">健管師</div>
          <div class="id-chip" data-id="guest" onclick="selectId(this)">受邀來賓</div>
          <div class="id-chip" data-id="staff" onclick="selectId(this)">行政 / 工作人員</div>
          <div class="id-chip" data-id="npo" onclick="selectId(this)">社區據點 / NPO 協會</div>
        </div>
      </div>

      <div class="field">
        <label>姓名</label>
        <input type="text" id="nameInput" placeholder="請輸入您的姓名">
      </div>

      <div class="field">
        <label>邀請人</label>
        <input type="text" id="inviterInput" placeholder="請輸入邀請您的人員姓名">
      </div>

      <button class="submit-btn" onclick="handleSubmit()">確認登入 →</button>
    </div>

    <div id="successSection" style="display:none;">
      <div class="success-screen">
        <div class="success-icon">
          <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#3d5a3e" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="success-title">歡迎參與！</h2>
        <p class="success-sub" id="successSub">身分已確認，請點擊下方連結進入課程</p>

        <div class="zoom-card">
          <div class="zoom-label">本次課程</div>
          <div class="zoom-title" id="successEventTitle">—</div>
          <a class="zoom-link-btn" id="zoomLinkBtn" href="#" target="_blank" rel="noopener">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="15" height="10" rx="2"/><path d="M17 9l5-3v12l-5-3"/>
            </svg>
            進入 Zoom 課程
          </a>
        </div>

        <span class="back-link" onclick="resetForm()">← 返回</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──
const ZOOM_LINK = localStorage.getItem('zoomLink') || 'https://zoom.us/j/your-room-id';

// ── Load active event ──
let activeEvent = null;

function loadActiveEvent() {
  const events = JSON.parse(localStorage.getItem('events') || '[]');
  activeEvent = events.find(e => e.active) || null;
  renderEvent();
}

function renderEvent() {
  const titleEl = document.getElementById('eventTitleDisplay');
  const descEl  = document.getElementById('eventDescDisplay');
  const frameEl = document.getElementById('dmFrame');

  if (!activeEvent) {
    titleEl.textContent = '';
    descEl.textContent  = '';
    return;
  }

  titleEl.textContent = activeEvent.title || '';
  descEl.textContent  = activeEvent.description || '';

  if (activeEvent.dmUrl) {
    frameEl.innerHTML = `<img src="${activeEvent.dmUrl}" alt="活動DM">`;
  } else {
    frameEl.innerHTML = `<div class="dm-empty">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>活動 DM 尚未上傳</span>
    </div>`;
  }
}

// ── Form logic ──
let selectedId = '';

function selectId(el) {
  document.querySelectorAll('.id-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedId = el.dataset.id;
}

function handleSubmit() {
  const name    = document.getElementById('nameInput').value.trim();
  const inviter = document.getElementById('inviterInput').value.trim();
  const errEl   = document.getElementById('errorMsg');

  if (!selectedId) { showError('請選擇您的身分'); return; }
  if (!name)        { showError('請填寫您的姓名'); return; }
  if (!inviter)     { showError('請填寫邀請人');   return; }

  errEl.style.display = 'none';

  // Save registration
  const events = JSON.parse(localStorage.getItem('events') || '[]');
  const idx    = events.findIndex(e => e.active);
  if (idx >= 0) {
    if (!events[idx].registrations) events[idx].registrations = [];
    events[idx].registrations.push({
      id: Date.now(),
      name, identity: selectedId, inviter,
      time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
    });
    localStorage.setItem('events', JSON.stringify(events));
  }

  // Show success
  const idMap = {health:'健管師', guest:'受邀來賓', staff:'行政/工作人員', npo:'社區據點/NPO協會'};
  document.getElementById('successSub').textContent = `歡迎 ${name}（${idMap[selectedId]}），請點擊下方連結進入課程`;
  document.getElementById('successEventTitle').textContent = activeEvent ? activeEvent.title : '本週線上課程';
  document.getElementById('zoomLinkBtn').href = ZOOM_LINK;

  document.getElementById('formSection').style.display = 'none';
  document.getElementById('successSection').style.display = 'block';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function resetForm() {
  selectedId = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('inviterInput').value = '';
  document.querySelectorAll('.id-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successSection').style.display = 'none';
  document.getElementById('formSection').style.display = 'block';
}

loadActiveEvent();
</script>
</body>
</html>
